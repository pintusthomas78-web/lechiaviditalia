<!DOCTYPE html>
<html lang="it">
<head>
  <!-- ===== IMPOSTAZIONI BASE PAGINA ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Chiavi d'Italia</title>

  <!-- ===== COLLEGAMENTO AL FILE CSS ===== -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== SFONDO MATRIX ===== -->
  <canvas id="matrix"></canvas>

  <!-- ===== CONTENUTO PRINCIPALE ===== -->
  <main class="overlay">

    <!-- ===== FINESTRA INTRO ===== -->
    <div class="intro-box">

      <!-- ===== TITOLO PRINCIPALE ===== -->
      <h1 class="site-title">LE CHIAVI D'ITALIA</h1>

      <!-- ===== SOTTOTITOLO ===== -->
      <div class="site-subtitle">La caccia al tesoro ha inizio</div>

      <!-- ===== TESTO INTRODUTTIVO ===== -->
      <p class="egypt-quote">"Non tutti arrivano fin qui."</p>
      <p class="egypt-quote">Tu sì.</p>
      <p class="egypt-quote">Questo significa che possiedi qualcosa di raro.</p>
      <p class="egypt-quote">Ora vediamo fin dove puoi spingerti...</p>

      <!-- ===== BOTTONE ENTRA ===== -->
      <button class="enter-btn" onclick="window.location.href='hub.html'">
        ENTRA
      </button>

    </div>

  </main>

  <!-- ===== SCRIPT ANIMAZIONE MATRIX ===== -->
  <script>
    /* ===== COLLEGAMENTO CANVAS ===== */
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    /* ===== CARATTERI DELLA PIOGGIA ===== */
    const letters = "𓂀𓆣𓅓𓋹𓃭𓂋𓁹𓆑𓊃𓏏𓈖𓍿ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    /* ===== IMPOSTAZIONI TESTO ===== */
    const fontSize = 18;
    let columns = 0;
    let drops = [];

    /* ===== ADATTA IL CANVAS ALLO SCHERMO ===== */
    function setCanvasSize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    /* ===== CREA LE COLONNE DELLA PIOGGIA ===== */
    function createDrops() {
      columns = Math.floor(canvas.width / fontSize);
      drops = [];

      for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
      }
    }

    /* ===== DISEGNO DELLA PIOGGIA ===== */
    function draw() {
      /* scia leggera */
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      /* caratteri nitidi oro */
      ctx.fillStyle = "rgba(255, 215, 0, 0.95)";
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.font = "bold " + fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillText(text, x, y);

        if (y > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i] += 0.9;
      }
    }

    /* ===== AVVIO ===== */
    setCanvasSize();
    createDrops();
    setInterval(draw, 40);

    /* ===== RESIZE ===== */
    window.addEventListener("resize", () => {
      setCanvasSize();
      createDrops();
    });
  </script>

</body>
</html>
