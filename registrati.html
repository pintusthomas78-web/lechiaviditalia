<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box">
    <h1>Registrati</h1>

    <input type="email" id="email" placeholder="Inserisci la tua email" required>
    <input type="password" id="password" placeholder="Crea una password" required>

    <button onclick="registrati()">Registrati</button>
  </div>

  <script>
    function registrati() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Compila tutti i campi");
        return;
      }

      localStorage.setItem("emailRegistrazione", email);
      window.location.href = "verifica.html";
    }
  </script>

</body>
</html>
