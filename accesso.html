<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso / Registrazione</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="login-shell">

    <div class="login-title-box">
      <h1>Le Chiavi d'Italia</h1>
      <p>Accedi o crea il tuo profilo</p>
    </div>

    <div class="login-columns">

      <!-- ===== ACCESSO ===== -->
      <div class="login-card">
        <h2>Accesso</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button id="loginBtn" class="login-btn">Accedi</button>
      </div>

      <!-- ===== REGISTRAZIONE ===== -->
      <div class="login-card">
        <h2>Registrazione</h2>

        <input type="text" id="nickname" placeholder="Nickname">
        <input type="email" id="registerEmail" placeholder="Email">
        <input type="password" id="registerPassword" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Conferma password">

        <button id="registerBtn" class="login-btn">Registrati</button>
      </div>

    </div>

    <p id="messaggio" style="text-align:center; margin-top:20px; color:#f1d97a;"></p>

  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>

</body>
</html>
