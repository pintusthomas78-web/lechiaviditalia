<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso / Registrati - Le Chiavi d'Italia</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <!-- ===== PIOGGIA DI CARATTERI ===== -->
  <canvas id="matrix"></canvas>

  <!-- ===== CONTENITORE LOGIN ===== -->
  <div class="login-shell">

    <!-- ===== TITOLO ===== -->
    <div class="login-title-box">
      <h1>ACCESSO / REGISTRATI</h1>
      <p>Entra nella caccia o crea il tuo profilo.</p>
    </div>

    <!-- ===== COLONNE ===== -->
    <div class="login-columns">

      <!-- ===== ACCESSO ===== -->
      <div class="login-card">
        <h2>Accedi</h2>

        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="Inserisci email">

        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Inserisci password">

        <button type="button" class="login-btn" onclick="accedi()">Accedi</button>
      </div>

      <!-- ===== REGISTRAZIONE ===== -->
      <div class="login-card">
        <h2>Registrati</h2>

        <label for="reg-nick">Nickname</label>
        <input id="reg-nick" type="text" placeholder="Scegli nickname">

        <label for="register-email">Email</label>
        <input id="register-email" type="email" placeholder="Inserisci email">

        <label for="register-password">Password</label>
        <input id="register-password" type="password" placeholder="Crea password">

        <button type="button" class="login-btn" onclick="registrati()">Registrati</button>
      </div>

    </div>

    <!-- ===== TORNA INDIETRO ===== -->
    <div class="login-back">
      <a href="hub.html" class="hub-btn">Torna all'hub</a>
    </div>

  </div>

  <!-- ===== FIREBASE ===== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbuc8hgLd4diUMJbDdITx-oQZn-mswLIA",
      authDomain: "lechiaviditalia.firebaseapp.com",
      projectId: "lechiaviditalia",
      appId: "1:97709098921:web:b17a87dd3d28fb7a1ae6b8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.registrati = async function () {
      const email = document.getElementById("register-email").value.trim();
      const password = document.getElementById("register-password").value.trim();

      if (!email || !password) {
        alert("Compila email e password");
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Registrazione completata. Ora effettua l'accesso.");
      } catch (error) {
        alert(error.message);
      }
    };

    window.accedi = async function () {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value.trim();

      if (!email || !password) {
        alert("Compila email e password");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "intro-video.html";
      } catch (error) {
        alert(error.message);
      }
    };
  </script>
