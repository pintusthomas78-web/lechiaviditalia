<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifica email</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box">
    <h1>Verifica email</h1>
    <p id="messaggio"></p>

    <div class="otp-box">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
    </div>
  </div>

  <script>
    const email = localStorage.getItem("emailRegistrazione");
    const messaggio = document.getElementById("messaggio");

    if (email) {
      messaggio.innerText = "Ti abbiamo inviato un codice a: " + email;
    } else {
      messaggio.innerText = "Errore: email non trovata";
    }
  </script>

</body>
</html>
