<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Video</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #codice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: gold;
      font-size: 64px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1s ease;
      text-shadow: 0 0 10px rgba(255,215,0,0.8);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <video id="video" controls autoplay muted playsinline>
      <source src="video/porta.mp4" type="video/mp4">
    </video>

    <div id="codice">4729</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const codice = document.getElementById("codice");

    video.addEventListener("timeupdate", () => {
      if (video.currentTime > 8) {
        codice.style.opacity = 1;
      }
    });

    video.play().catch((err) => {
      console.log("Autoplay bloccato:", err);
    });
  </script>

</body>
</html>
