<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Porta</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Georgia, serif;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      background: black;
    }

    .porta {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1);
      animation: zoomPorta 8s ease forwards;
      display: block;
    }

    @keyframes zoomPorta {
      0% { transform: scale(1); }
      100% { transform: scale(1.8); }
    }

    .messaggio {
      position: absolute;
      top: 78%;
      left: 50%;
      transform: translateX(-50%);
      color: gold;
      font-size: 20px;
      text-align: center;
      text-shadow: 0 0 10px rgba(255,215,0,0.7);
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1000;
      width: 90%;
      max-width: 520px;
    }

    .codice-box {
      position: absolute;
      top: 68%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 10px;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1000;
    }

    .codice-input {
      width: 52px;
      height: 58px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.95);
      color: #1a1a1a;
    }

    .entra-btn {
      position: absolute;
      top: 88%;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: gold;
      color: black;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1000;
    }
  </style>
</head>

<body>

  <div class="scene">
    <img src="file_00000000813471f485af95f5decb4fe4.png" class="porta" alt="Portoni">

    <div class="messaggio" id="messaggio">
      Inserisci il codice per oltrepassare la prima soglia
    </div>

    <div class="codice-box" id="codiceBox">
      <input class="codice-input" type="text" maxlength="1" id="c1">
      <input class="codice-input" type="text" maxlength="1" id="c2">
      <input class="codice-input" type="text" maxlength="1" id="c3">
      <input class="codice-input" type="text" maxlength="1" id="c4">
    </div>

    <button class="entra-btn" id="entraBtn" onclick="verificaCodice()">Entra</button>
  </div>

  <script>
    const codiceCorretto = "123A";
    setTimeout(() => {
  document.getElementById("entraBtn").style.opacity = "1";
}, 8000);
    
   window.onload = function () {
      setTimeout(() => {
        document.getElementById("messaggio").style.opacity = "1";
      }, 7000);

      setTimeout(() => {
        document.getElementById("codiceBox").style.opacity = "1";
      }, 8000);

      setTimeout(() => {
        document.getElementById("entraBtn").style.opacity = "1";
      }, 8000);
    };

    const inputs = document.querySelectorAll(".codice-input");

    inputs.forEach((input, index) => {
      input.addEventListener("input", () => {
        input.value = input.value.toUpperCase();
        if (input.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "" && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    function verificaCodice() {
      const codiceInserito =
        document.getElementById("c1").value +
        document.getElementById("c2").value +
        document.getElementById("c3").value +
        document.getElementById("c4").value;

      if (codiceInserito === codiceCorretto) {
        window.location.href = "livello2.html";
      } else {
        alert("Codice errato");
      }
    }
  </script>

</body>
</html>
