      overflow: hidden;
      position: relative;
    }

    .porta {

      height: 100%;
      object-fit: cover;
      transform: scale(1);
      animation: zoomPorta 8s ease forwards;
      display: block;
    }

        transform: scale(1);
      }
      100% {
        transform: scale(1.8);
      }
    }

      opacity: 0;

      text-align: center;
      text-shadow: 0 0 10px rgba(255,215,0,0.7);
      z-index: 10;
    }
