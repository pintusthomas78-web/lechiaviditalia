<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro Porta</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    .scene {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .porta {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1);
      animation: zoomPorta 8s ease forwards;
    }

    @keyframes zoomPorta {
      0% { transform: scale(1); }
      100% { transform: scale(1.8); }
    }

    #codice {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 70px;
      color: gold;
      letter-spacing: 10px;
      opacity: 0;
      transition: opacity 1s;
      text-shadow: 0 0 15px gold;
    }
  </style>
</head>

<body>

<div class="scene">
  <img src="file_00000000813471f485af95f5decb4fe4.png" class="porta">
  <div id="codice">4729</div>
</div>

<script>
  setTimeout(() => {
    document.getElementById("codice").style.opacity = 1;
  }, 7000);
</script>

</body>
</html>
